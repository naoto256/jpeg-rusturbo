name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Test the (os × feature) combinations that matter for this crate.
  # Targets covered:
  #   ubuntu-latest    → x86_64-unknown-linux-gnu     (AVX2 / scalar)
  #   macos-14         → aarch64-apple-darwin         (NEON / scalar)
  #   windows-latest   → x86_64-pc-windows-msvc       (AVX2 / scalar)
  #   windows-11-arm   → aarch64-pc-windows-msvc      (NEON / scalar)
  # Each (os, features) pair runs the full test suite; doctests run on
  # the default-feature build only. Bit-exact equivalence against the
  # scalar reference is asserted by the cross-check unit tests inside
  # each SIMD backend module.
  test:
    name: test (${{ matrix.os }} / ${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
          - windows-11-arm
        features:
          - ""
          - "--features force-scalar"
        include:
          - features: ""
            label: default-simd
          - features: "--features force-scalar"
            label: force-scalar
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin-audit:2026-06-03 de0fac2 | v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # pin-audit:2026-05-20 29eef33 stable-branch | stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # pin-audit:2026-05-20 e18b497 | v2
        with:
          key: ${{ matrix.os }}-${{ matrix.label }}

      - name: Build
        run: cargo build --release ${{ matrix.features }} --all-targets

      - name: Test
        run: cargo test --release ${{ matrix.features }}

      # Doctests only run on the default-feature build (the doc examples
      # don't depend on force-scalar; running them once is enough).
      - name: Doctests
        if: matrix.features == ''
        run: cargo test --release --doc

  # Static checks: rustfmt + clippy. Run only on Linux x86_64 — these
  # don't depend on the active SIMD backend.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin-audit:2026-06-03 de0fac2 | v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # pin-audit:2026-05-20 29eef33 stable-branch | stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # pin-audit:2026-05-20 e18b497 | v2
        with:
          key: lint

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --release --all-targets -- -D warnings

  # Build rustdoc with broken-link / missing-attribution checks turned
  # into hard errors. This catches doc rot before docs.rs sees it.
  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin-audit:2026-06-03 de0fac2 | v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # pin-audit:2026-05-20 29eef33 stable-branch | stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # pin-audit:2026-05-20 e18b497 | v2
        with:
          key: docs

      - name: cargo doc
        run: cargo doc --no-deps --release
